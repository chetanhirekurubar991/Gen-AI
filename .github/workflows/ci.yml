name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Day 51_Environment Variables Managing .env secrets securely."

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest test_main.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: "Day 51_Environment Variables Managing .env secrets securely."

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fastapi-app:test .

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/Gen-AI
            git pull origin main
            docker build -t fastapi-app:latest "Day 51_Environment Variables Managing .env secrets securely."
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            docker run -d \
              --name fastapi-app \
              -p 8000:8000 \
              fastapi-app:latest
              
