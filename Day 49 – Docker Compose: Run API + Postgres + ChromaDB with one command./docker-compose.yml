services:
  api:
    build: .
    depends_on:
      - db
      - vectordb
    ports:
      - "8000:8000"
    networks:
      - backend-net


  db:
    image: "postgres:15"
    env_file:
      - .env
#    environment:
#      POSTGRES_USER: postgres
#      POSTGRES_PASSWORD: postgres
#      POSTGRES_DB: ragdb
    networks:
      - backend-net
    volumes:
      - postgres-data:/var/lib/postgresql/data

  vectordb:
    image: "chromadb/chroma"
    ports:
      - "8001:8000"
    networks:
      - backend-net
    volumes:
      - chroma-data:/chroma/chroma

networks:
  backend-net:

volumes:
  postgres-data:
  chroma-data: