services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      vectordb:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - backend-net
    volumes:
      - .:/app
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: "postgres:15"
    env_file:
      - .env
    networks:
      - backend-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  vectordb:
    image: "chromadb/chroma"
    ports:
      - "8001:8000"
    networks:
      - backend-net
    volumes:
      - chroma-data:/chroma/chroma

networks:
  backend-net:
volumes:
  postgres-data:
  chroma-data: