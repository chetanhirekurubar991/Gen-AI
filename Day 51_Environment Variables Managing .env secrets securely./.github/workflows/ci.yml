name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    run-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        user: actions/setup-python@v5
        with: 
          python-verson: '3.11'

      - name: Install dependencies
        run: pip install -r "Day 51_Environment Variables Managing .env secrets securely.requirements.txt"

      - name: Run tests
        run: pytest "Day 51_Environment Variables Managing .env secrets securely.test_main.py -v"
