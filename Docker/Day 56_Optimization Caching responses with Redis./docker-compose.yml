services:
  web:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network
    command: redis-server --bind 0.0.0.0 --protected-mode no
networks:
  app-network:
    driver: bridge